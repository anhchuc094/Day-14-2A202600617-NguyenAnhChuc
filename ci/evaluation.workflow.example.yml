name: Evaluation Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python tests/test_solution.py

      - name: Run evaluation quality gate
        run: python scripts/evaluate_quality_gate.py
